name: Update Lotto Data

on:
  schedule:
    - cron: '0 17-23 * * 6'   # 토 17~23 UTC = 일 02~08시 KST
    - cron: '0 0-13 * * 0'    # 일 00~13 UTC = 일 09~22시 KST
  workflow_dispatch:

permissions:
  contents: write           # winners.json 커밋/푸시 권한

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Fetch new draws
        run: node update-lotto.js

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain winners.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add winners.json
            git commit -m "chore: 로또 결과 자동 업데이트"
            git push
            echo "푸시 완료"
          else
            echo "변경 없음 — 커밋 생략"
          fi
